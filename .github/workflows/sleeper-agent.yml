name: Sleeper Agent

on:
  schedule:
    - cron: '0 18 * * *'  # 6pm UTC = 2pm ET
  workflow_dispatch:  # allows manual trigger for testing

permissions:
  contents: write  # needed to commit tokens.json back

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 for all JS actions
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'  # your runtime for ts-node
      - run: npm install
      - run: npx ts-node agent.ts
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BOYFRIEND_EMAIL: ${{ secrets.BOYFRIEND_EMAIL }}
